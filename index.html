<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini GTA Mobile</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

canvas{
background:#222;
display:block;
margin:auto;
}

#ui{
padding:8px;
font-size:18px;
}

.controls{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:20px;
box-sizing:border-box;
}

.move{
display:grid;
grid-template-columns:60px 60px 60px;
grid-template-rows:60px 60px 60px;
gap:5px;
}

button{
font-size:20px;
border:none;
border-radius:10px;
background:#444;
color:white;
}

.shoot{
width:80px;
height:80px;
background:red;
font-size:24px;
}

</style>
</head>

<body>

<h3>🚗 Mini GTA Mobile</h3>
<div id="ui">Vida: 100 | Pontos: 0</div>

<canvas id="game"></canvas>

<div class="controls">

<div class="move">
<div></div>
<button onclick="move('up')">⬆️</button>
<div></div>

<button onclick="move('left')">⬅️</button>
<div></div>
<button onclick="move('right')">➡️</button>

<div></div>
<button onclick="move('down')">⬇️</button>
<div></div>
</div>

<button class="shoot" onclick="shoot()">🔫</button>

</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight * 0.6;

let bullets = [];
let enemies = [];
let score = 0;

const player = {
x:canvas.width/2,
y:canvas.height/2,
size:25,
speed:20,
health:100
};

function move(dir){

if(dir==="up") player.y -= player.speed;
if(dir==="down") player.y += player.speed;
if(dir==="left") player.x -= player.speed;
if(dir==="right") player.x += player.speed;

}

function shoot(){

bullets.push({
x:player.x,
y:player.y,
dy:-10,
size:6
});

}

function spawnEnemy(){

let x = Math.random()*canvas.width;
let y = 0;

enemies.push({
x:x,
y:y,
size:25,
speed:2
});

}

setInterval(spawnEnemy,2000);

function update(){

bullets.forEach(b=>{
b.y += b.dy;
});

enemies.forEach((e,ei)=>{

let dx = player.x - e.x;
let dy = player.y - e.y;
let dist = Math.sqrt(dx*dx + dy*dy);

e.x += dx/dist * e.speed;
e.y += dy/dist * e.speed;

if(dist < player.size){
player.health -= 1;
}

bullets.forEach((b,bi)=>{

if(
b.x < e.x+e.size &&
b.x+b.size > e.x &&
b.y < e.y+e.size &&
b.y+b.size > e.y
){
enemies.splice(ei,1);
bullets.splice(bi,1);
score+=10;
}

});

});

if(player.health<=0){
alert("💀 Game Over | Pontos: "+score);
location.reload();
}

document.getElementById("ui").innerText =
"Vida: "+player.health+" | Pontos: "+score;

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="lime";
ctx.fillRect(player.x,player.y,player.size,player.size);

ctx.fillStyle="yellow";
bullets.forEach(b=>{
ctx.fillRect(b.x,b.y,b.size,b.size);
});

ctx.fillStyle="red";
enemies.forEach(e=>{
ctx.fillRect(e.x,e.y,e.size,e.size);
});

}

function gameLoop(){

update();
draw();
requestAnimationFrame(gameLoop);

}

gameLoop();

</script>

</body>
</html>
