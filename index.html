<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zombie Survival 3D</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#crosshair{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:30px;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:18px;
}

#weapon{
position:absolute;
top:10px;
right:10px;
color:white;
font-size:18px;
}

#joystick{
position:absolute;
bottom:40px;
left:40px;
width:120px;
height:120px;
border:2px solid white;
border-radius:50%;
}

#stick{
position:absolute;
width:40px;
height:40px;
background:white;
border-radius:50%;
left:40px;
top:40px;
}

#shootBtn{
position:absolute;
bottom:50px;
right:50px;
width:90px;
height:90px;
background:red;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:20px;
}

</style>
</head>

<body>

<div id="crosshair">+</div>

<div id="ui">
Score: <span id="score">0</span><br>
Vida: <span id="health">100</span>
</div>

<div id="weapon">
Arma: <span id="weaponName">Pistola</span>
</div>

<div id="joystick"><div id="stick"></div></div>
<div id="shootBtn">FIRE</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

// cena
let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

let renderer = new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

camera.position.y = 1.6
camera.position.z = 5

// luz
let sun = new THREE.DirectionalLight(0xffffff,1)
sun.position.set(10,20,10)
scene.add(sun)

scene.add(new THREE.AmbientLight(0xaaaaaa))

// chão
let floorGeo = new THREE.PlaneGeometry(500,500)
let floorMat = new THREE.MeshStandardMaterial({color:0x222222})
let floor = new THREE.Mesh(floorGeo,floorMat)

floor.rotation.x = -Math.PI/2
scene.add(floor)

// prédios
function building(x,z){

let geo = new THREE.BoxGeometry(6,Math.random()*20+10,6)
let mat = new THREE.MeshStandardMaterial({color:0x444444})

let mesh = new THREE.Mesh(geo,mat)

mesh.position.x = x
mesh.position.z = z
mesh.position.y = geo.parameters.height/2

scene.add(mesh)

}

for(let i=0;i<60;i++){

building(
(Math.random()*300)-150,
(Math.random()*300)-150
)

}

// arma
let gunGeo = new THREE.BoxGeometry(0.3,0.2,1)
let gunMat = new THREE.MeshStandardMaterial({color:0x333333})
let gun = new THREE.Mesh(gunGeo,gunMat)

gun.position.set(0.5,-0.4,-1)

camera.add(gun)
scene.add(camera)

// jogador
let player = {
x:0,
z:5,
speed:0.15
}

// UI
let score = 0
let health = 100

// armas
let weapons = [
{name:"Pistola",damage:1,fireRate:400},
{name:"Rifle",damage:2,fireRate:150},
{name:"Shotgun",damage:4,fireRate:700}
]

let currentWeapon = 0

document.getElementById("weaponName").innerText =
weapons[currentWeapon].name

// troca arma
window.addEventListener("keydown",e=>{

if(e.key==="1"){currentWeapon=0}
if(e.key==="2"){currentWeapon=1}
if(e.key==="3"){currentWeapon=2}

document.getElementById("weaponName").innerText =
weapons[currentWeapon].name

})

// zumbis
let enemies=[]

function spawnZombie(){

let geo = new THREE.BoxGeometry(1,2,1)
let mat = new THREE.MeshStandardMaterial({color:0x00aa00})

let z = new THREE.Mesh(geo,mat)

z.position.x=(Math.random()*120)-60
z.position.z=(Math.random()*120)-60
z.position.y=1

z.health=5

scene.add(z)

enemies.push(z)

}

setInterval(spawnZombie,2000)

// loot
let loots=[]

function spawnLoot(){

let geo = new THREE.BoxGeometry(1,1,1)
let mat = new THREE.MeshStandardMaterial({color:0xffff00})

let box = new THREE.Mesh(geo,mat)

box.position.x=(Math.random()*80)-40
box.position.z=(Math.random()*80)-40
box.position.y=0.5

scene.add(box)

loots.push(box)

}

setInterval(spawnLoot,8000)

// tiro
function shoot(){

let raycaster = new THREE.Raycaster()

raycaster.setFromCamera({x:0,y:0},camera)

let hits = raycaster.intersectObjects(enemies)

if(hits.length>0){

let enemy = hits[0].object

enemy.health -= weapons[currentWeapon].damage

enemy.material.color.set(0xffff00)

if(enemy.health<=0){

scene.remove(enemy)

enemies.splice(enemies.indexOf(enemy),1)

score++

document.getElementById("score").innerText=score

}

}

}

document.getElementById("shootBtn").addEventListener("touchstart",shoot)
window.addEventListener("click",shoot)

// joystick
let joystick=document.getElementById("joystick")
let stick=document.getElementById("stick")

let moveX=0
let moveY=0

joystick.addEventListener("touchmove",(e)=>{

let rect=joystick.getBoundingClientRect()

let x=e.touches[0].clientX-rect.left-60
let y=e.touches[0].clientY-rect.top-60

moveX=x/40
moveY=y/40

stick.style.left=(40+x)+"px"
stick.style.top=(40+y)+"px"

})

joystick.addEventListener("touchend",()=>{

moveX=0
moveY=0

stick.style.left="40px"
stick.style.top="40px"

})

// dia e noite
let time = 0

// animação
function animate(){

requestAnimationFrame(animate)

time += 0.001

sun.intensity = Math.sin(time)+1

// mover jogador
player.x += moveX * player.speed
player.z += moveY * player.speed

camera.position.x = player.x
camera.position.z = player.z

// IA zumbi
enemies.forEach(enemy=>{

let dx = player.x - enemy.position.x
let dz = player.z - enemy.position.z

let dist = Math.sqrt(dx*dx + dz*dz)

enemy.position.x += dx/dist*0.04
enemy.position.z += dz/dist*0.04

if(dist<1.5){

health -= 0.1

document.getElementById("health").innerText =
Math.floor(health)

}

})

// loot coleta
loots.forEach(box=>{

let dx = player.x - box.position.x
let dz = player.z - box.position.z

let dist = Math.sqrt(dx*dx+dz*dz)

if(dist<2){

health += 10

scene.remove(box)

}

})

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
