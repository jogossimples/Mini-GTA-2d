<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clicker Minecraft Avançado</title>
<style>
  body {
    margin: 0;
    font-family: 'Press Start 2P', cursive;
    background: #87CEEB;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #fff;
  }

  h1 {
    margin-top: 20px;
    text-align: center;
    text-shadow: 2px 2px 0 #000;
  }

  #block {
    width: 150px;
    height: 150px;
    margin-top: 50px;
    cursor: pointer;
    image-rendering: pixelated;
    border: 4px solid #000;
    box-shadow: 4px 4px 0 #555;
    transition: transform 0.1s;
  }

  #block:active {
    transform: scale(0.9);
  }

  #stats {
    margin-top: 30px;
    text-align: center;
  }

  .stat {
    font-size: 16px;
    margin: 5px 0;
  }

  #upgrades {
    margin-top: 30px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    width: 90%;
  }

  .upgrade-btn {
    background: #8B4513;
    color: #fff;
    border: 2px solid #000;
    border-radius: 5px;
    padding: 10px;
    font-size: 12px;
    cursor: pointer;
    flex: 1 0 140px;
    text-align: center;
    image-rendering: pixelated;
  }

  .upgrade-btn:hover {
    background: #A0522D;
  }
</style>
</head>
<body>

<h1>⛏️ Clicker Minecraft Avançado ⛏️</h1>

<img id="block" src="https://i.imgur.com/4P0UkkC.png" alt="Bloco">

<div id="stats">
  <div class="stat">Minérios: <span id="resources">0</span></div>
  <div class="stat">Por clique: <span id="rpc">1</span></div>
  <div class="stat">Automático por segundo: <span id="rps">0</span></div>
</div>

<div id="upgrades">
  <button class="upgrade-btn" data-cost="20" data-rpc="1">Upgrade Clique +1 (20)</button>
  <button class="upgrade-btn" data-cost="50" data-rps="1">Gerador Automático +1/s (50)</button>
</div>

<audio id="mine-sound" src="https://freesound.org/data/previews/341/341695_3248244-lq.mp3"></audio>

<script>
let resources = 0;
let rpc = 1;
let rps = 0;

// Blocos
const blocks = [
  {name:'Madeira', src:'https://i.imgur.com/4P0UkkC.png', value:1},
  {name:'Pedra', src:'https://i.imgur.com/dYcYQ7E.png', value:3},
  {name:'Diamante', src:'https://i.imgur.com/q3bXrWa.png', value:10}
];
let currentBlock = 0;

const resourcesEl = document.getElementById('resources');
const rpcEl = document.getElementById('rpc');
const rpsEl = document.getElementById('rps');
const blockEl = document.getElementById('block');
const mineSound = document.getElementById('mine-sound');

// Clicar no bloco
blockEl.addEventListener('click', () => {
  resources += rpc * blocks[currentBlock].value;
  resourcesEl.textContent = resources;

  blockEl.style.transform = 'scale(0.95)';
  setTimeout(() => blockEl.style.transform = 'scale(1)', 100);

  mineSound.currentTime = 0;
  mineSound.play();
});

// Trocar bloco a cada 20 cliques
let clickCounter = 0;
blockEl.addEventListener('click', () => {
  clickCounter++;
  if(clickCounter >= 20){
    clickCounter = 0;
    currentBlock = (currentBlock + 1) % blocks.length;
    blockEl.src = blocks[currentBlock].src;
  }
});

// Upgrades
document.querySelectorAll('.upgrade-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const cost = parseInt(btn.dataset.cost);
    if(resources >= cost){
      resources -= cost;
      if(btn.dataset.rpc) rpc += parseInt(btn.dataset.rpc);
      if(btn.dataset.rps) rps += parseInt(btn.dataset.rps);
      resourcesEl.textContent = resources;
      rpcEl.textContent = rpc;
      rpsEl.textContent = rps;

      // Aumenta custo progressivamente
      btn.dataset.cost = Math.floor(cost * 1.5);
      btn.textContent = btn.textContent.replace(/\(\d+\)/, `(${btn.dataset.cost})`);
    }
  });
});

// Geração automática
setInterval(() => {
  resources += rps;
  resourcesEl.textContent = resources;
}, 1000);

</script>

</body>
</html>
