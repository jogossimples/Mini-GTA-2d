<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  margin:0;
  background:#2c3e50;
  color:white;
  font-family:Arial;
  text-align:center;
}

#top{
  padding:10px;
  font-size:20px;
}

canvas{
  background:#3cb043;
  width:100%;
  height:55vh;
}

#cards{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  padding:10px;
}

button{
  font-size:18px;
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
}

</style>

</head>

<body>

<div id="top">
  Elixir: <span id="elixir">5</span>
</div>

<canvas id="game"></canvas>

<div id="cards">
  <button onclick="spawn('cat')">🐱 3</button>
  <button onclick="spawn('knight')">🗡 4</button>
  <button onclick="spawn('tank')">🐻 5</button>
</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = 350;

let elixir = 5;

let troops = [];
let enemies = [];

let towers = [
  {x:50,y:140,hp:300},
  {x:50,y:260,hp:300},
  {x:120,y:200,hp:500}
];

let enemyTowers = [
  {x:canvas.width-50,y:140,hp:300},
  {x:canvas.width-50,y:260,hp:300},
  {x:canvas.width-120,y:200,hp:500}
];

/* Elixir regen */
setInterval(()=>{
  if(elixir < 10) elixir++;
  document.getElementById("elixir").innerText = elixir;
},1000);

/* Spawn tropas */
function spawn(type){
  let yPositions = [140, 200, 260];
  let y = yPositions[Math.floor(Math.random() * yPositions.length)];

  if(type==="cat" && elixir>=3){
    troops.push({x:150,y:y,hp:30,atk:0.4,speed:1,target:null});
    elixir-=3;
  }

  if(type==="knight" && elixir>=4){
    troops.push({x:150,y:y,hp:60,atk:0.3,speed:0.8,target:null});
    elixir-=4;
  }

  if(type==="tank" && elixir>=5){
    troops.push({x:150,y:y,hp:120,atk:0.2,speed:0.5,target:null});
    elixir-=5;
  }
}

/* Spawn inimigos */
setInterval(()=>{
  let yPositions = [140, 200, 260];
  let y = yPositions[Math.floor(Math.random() * yPositions.length)];
  enemies.push({x:canvas.width-150,y:y,hp:40,atk:0.3,speed:-0.8,target:null});
},4000);

/* Update */
function update(){

  // Tropas atacando torres inimigas
  troops.forEach(t=>{
    // Se já tem alvo, não move
    if(!t.target){
      // Procura torre inimiga próxima
      for(let tower of enemyTowers){
        if(Math.abs(t.x - tower.x) < 30 && t.y === tower.y){
          t.target = tower;
        }
      }
    }
    if(t.target){
      t.target.hp -= t.atk;
    } else {
      t.x += t.speed;
    }
  });

  // Inimigos atacando torres amigas
  enemies.forEach(e=>{
    if(!e.target){
      for(let tower of towers){
        if(Math.abs(e.x - tower.x) < 30 && e.y === tower.y){
          e.target = tower;
        }
      }
    }
    if(e.target){
      e.target.hp -= e.atk;
    } else {
      e.x += e.speed;
    }
  });

  // Tropas atacando inimigos
  troops.forEach(t=>{
    enemies.forEach(e=>{
      if(Math.abs(t.x - e.x) < 20 && t.y === e.y){
        e.hp -= t.atk;
        t.hp -= e.atk;
      }
    });
  });

  // Remover mortos
  troops = troops.filter(t => t.hp > 0);
  enemies = enemies.filter(e => e.hp > 0);
  towers = towers.filter(t => t.hp > 0);
  enemyTowers = enemyTowers.filter(t => t.hp > 0);
}

/* Draw */
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  /* Linha arena */
  ctx.fillStyle="#95a5a6";
  ctx.fillRect(canvas.width/2-5,0,10,canvas.height);

  /* Torres */
  ctx.fillStyle="blue";
  towers.forEach(t=>{
    ctx.fillRect(t.x,t.y,40,40);
  });

  ctx.fillStyle="red";
  enemyTowers.forEach(t=>{
    ctx.fillRect(t.x-40,t.y,40,40);
  });

  /* Tropas */
  ctx.fillStyle="orange";
  troops.forEach(t=>{
    ctx.fillRect(t.x,t.y,20,20);
  });

  /* Inimigos */
  ctx.fillStyle="black";
  enemies.forEach(e=>{
    ctx.fillRect(e.x,e.y,20,20);
  });
}

/* Loop */
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
