<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kitty Castle Battle</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
}

#ui{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:20px;
}

#attack{
position:fixed;
right:30px;
bottom:40px;
width:90px;
height:90px;
border-radius:50%;
border:none;
background:purple;
color:white;
font-size:30px;
}

#joystick{
position:fixed;
left:30px;
bottom:40px;
width:120px;
height:120px;
background:rgba(255,255,255,0.15);
border-radius:50%;
}

#stick{
position:absolute;
width:60px;
height:60px;
left:30px;
top:30px;
background:white;
border-radius:50%;
}

</style>
</head>

<body>

<div id="ui">Vida: 100</div>

<div id="joystick">
<div id="stick"></div>
</div>

<button id="attack">✨</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

/* LUZ */

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

/* CHÃO */

const ground = new THREE.Mesh(
new THREE.BoxGeometry(80,1,80),
new THREE.MeshStandardMaterial({color:0x2a7d2e})
);

ground.position.y=-0.5;
scene.add(ground);

/* CASTELO */

function wall(x,z){

let mesh = new THREE.Mesh(
new THREE.BoxGeometry(6,6,2),
new THREE.MeshStandardMaterial({color:0x888888})
);

mesh.position.set(x,3,z);

scene.add(mesh);

}

wall(-20,-20);
wall(20,-20);
wall(-20,20);
wall(20,20);

/* PLAYER */

const player = new THREE.Mesh(
new THREE.BoxGeometry(1,1,1),
new THREE.MeshStandardMaterial({color:0xffaa00})
);

player.position.y=0.5;

scene.add(player);

camera.position.set(0,6,8);

/* MAGIA */

let spells=[];

function castSpell(){

let spell = new THREE.Mesh(
new THREE.SphereGeometry(0.3,16,16),
new THREE.MeshStandardMaterial({color:0xaa00ff,emissive:0xaa00ff})
);

spell.position.copy(player.position);

spell.userData.vel = new THREE.Vector3(0,0,-0.5);

scene.add(spell);

spells.push(spell);

}

/* INIMIGOS */

let enemies=[];
let playerHP=100;

function spawnEnemy(){

let enemy = new THREE.Mesh(
new THREE.BoxGeometry(1,1,1),
new THREE.MeshStandardMaterial({color:0xff0000})
);

enemy.position.set(
(Math.random()-0.5)*40,
0.5,
(Math.random()-0.5)*40
);

scene.add(enemy);

enemies.push(enemy);

}

for(let i=0;i<5;i++) spawnEnemy();

/* MOVIMENTO */

let moveX=0;
let moveZ=0;

/* UPDATE */

function update(){

player.position.x+=moveX;
player.position.z+=moveZ;

/* câmera */

camera.position.x=player.position.x;
camera.position.z=player.position.z+8;
camera.lookAt(player.position);

/* magia */

spells.forEach((s,i)=>{

s.position.add(s.userData.vel);

enemies.forEach((e,ei)=>{

if(s.position.distanceTo(e.position)<1){

scene.remove(e);
scene.remove(s);

enemies.splice(ei,1);
spells.splice(i,1);

spawnEnemy();

}

});

});

/* inimigos perseguem */

enemies.forEach(e=>{

let dir = player.position.clone().sub(e.position).normalize();

e.position.add(dir.multiplyScalar(0.03));

if(e.position.distanceTo(player.position)<1){

playerHP-=0.1;

}

});

if(playerHP<=0){

alert("Game Over");
location.reload();

}

document.getElementById("ui").innerText =
"Vida: "+Math.floor(playerHP);

}

/* LOOP */

function animate(){

requestAnimationFrame(animate);

update();

renderer.render(scene,camera);

}

animate();

/* ATAQUE */

document.getElementById("attack").onclick=castSpell;

/* JOYSTICK */

const joystick=document.getElementById("joystick");
const stick=document.getElementById("stick");

let dragging=false;

joystick.addEventListener("touchstart",()=>dragging=true);

document.addEventListener("touchend",()=>{
dragging=false;
moveX=0;
moveZ=0;
stick.style.left="30px";
stick.style.top="30px";
});

document.addEventListener("touchmove",(e)=>{

if(!dragging) return;

let rect=joystick.getBoundingClientRect();

let touch=e.touches[0];

let x=touch.clientX-rect.left-60;
let y=touch.clientY-rect.top-60;

let dist=Math.sqrt(x*x+y*y);
let max=40;

if(dist>max){
x=x/dist*max;
y=y/dist*max;
}

stick.style.left=(x+30)+"px";
stick.style.top=(y+30)+"px";

moveX=x*0.02;
moveZ=y*0.02;

});

</script>

</body>
</html>
