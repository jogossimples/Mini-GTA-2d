<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>3D Shooter</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
}

#crosshair{
position:absolute;
top:50%;
left:50%;
font-size:30px;
color:white;
transform:translate(-50%,-50%);
}

#score{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:Arial;
font-size:20px;
}

</style>

</head>

<body>

<div id="crosshair">+</div>
<div id="score">Score: 0</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

let score = 0

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth / window.innerHeight,
0.1,
1000
)

let renderer = new THREE.WebGLRenderer()

renderer.setSize(window.innerWidth, window.innerHeight)

document.body.appendChild(renderer.domElement)

camera.position.z = 5

// luz
let light = new THREE.DirectionalLight(0xffffff,1)
light.position.set(5,10,7)
scene.add(light)

// chão
let floorGeometry = new THREE.PlaneGeometry(100,100)
let floorMaterial = new THREE.MeshStandardMaterial({color:0x333333})

let floor = new THREE.Mesh(floorGeometry,floorMaterial)

floor.rotation.x = -Math.PI/2
floor.position.y = -2

scene.add(floor)

// inimigos
let enemies = []

function createEnemy(){

let geometry = new THREE.BoxGeometry()
let material = new THREE.MeshStandardMaterial({color:0xff0000})

let enemy = new THREE.Mesh(geometry,material)

enemy.position.x = (Math.random()*10)-5
enemy.position.y = 0
enemy.position.z = -20

scene.add(enemy)

enemies.push(enemy)

}

setInterval(createEnemy,2000)

// tiro
window.addEventListener("click",shoot)

function shoot(){

let raycaster = new THREE.Raycaster()

raycaster.setFromCamera({x:0,y:0},camera)

let hits = raycaster.intersectObjects(enemies)

if(hits.length>0){

let enemy = hits[0].object

scene.remove(enemy)

enemies.splice(enemies.indexOf(enemy),1)

score++

document.getElementById("score").innerHTML="Score: "+score

}

}

// animação
function animate(){

requestAnimationFrame(animate)

enemies.forEach(enemy=>{
enemy.position.z += 0.1
})

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
