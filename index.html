<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:#2c3e50;
color:white;
font-family:Arial;
text-align:center;
}

#top{
padding:10px;
font-size:20px;
}

canvas{
background:#3cb043;
width:100%;
height:55vh;
}

#cards{
position:fixed;
bottom:0;
width:100%;
background:#111;
padding:10px;
}

button{
font-size:18px;
padding:10px;
margin:5px;
border:none;
border-radius:10px;
}

</style>

</head>

<body>

<div id="top">
Elixir: <span id="elixir">5</span>
</div>

<canvas id="game"></canvas>

<div id="cards">
<button onclick="spawn('cat')">🐱 3</button>
<button onclick="spawn('knight')">🗡 4</button>
<button onclick="spawn('tank')">🐻 5</button>
</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=350;

let elixir=5;

let troops=[];
let enemies=[];

let towers=[
{x:50,y:140,hp:300},
{x:50,y:260,hp:300},
{x:120,y:200,hp:500}
];

let enemyTowers=[
{x:canvas.width-50,y:140,hp:300},
{x:canvas.width-50,y:260,hp:300},
{x:canvas.width-120,y:200,hp:500}
];

/* elixir regen */

setInterval(()=>{

if(elixir<10) elixir++;

document.getElementById("elixir").innerText=elixir;

},1000);

/* spawn tropas */

function spawn(type){

if(type==="cat" && elixir>=3){

troops.push({x:150,y:200,hp:30,atk:0.4,speed:1});

elixir-=3;

}

if(type==="knight" && elixir>=4){

troops.push({x:150,y:200,hp:60,atk:0.3,speed:0.8});

elixir-=4;

}

if(type==="tank" && elixir>=5){

troops.push({x:150,y:200,hp:120,atk:0.2,speed:0.5});

elixir-=5;

}

}

/* inimigo */

setInterval(()=>{

enemies.push({
x:canvas.width-150,
y:200,
hp:40,
atk:0.3,
speed:-0.8
});

},4000);

/* update */

function update(){

troops.forEach(t=>{

t.x+=t.speed;

enemyTowers.forEach(tower=>{

if(Math.abs(t.x-tower.x)<30){

tower.hp-=t.atk;

}

});

});

enemies.forEach(e=>{

e.x+=e.speed;

towers.forEach(tower=>{

if(Math.abs(e.x-tower.x)<30){

tower.hp-=e.atk;

}

});

});

}

/* draw */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* linha arena */

ctx.fillStyle="#95a5a6";
ctx.fillRect(canvas.width/2-5,0,10,canvas.height);

/* torres */

ctx.fillStyle="blue";

towers.forEach(t=>{
ctx.fillRect(t.x,t.y,40,40);
});

ctx.fillStyle="red";

enemyTowers.forEach(t=>{
ctx.fillRect(t.x-40,t.y,40,40);
});

/* tropas */

ctx.fillStyle="orange";

troops.forEach(t=>{
ctx.fillRect(t.x,t.y,20,20);
});

/* inimigos */

ctx.fillStyle="black";

enemies.forEach(e=>{
ctx.fillRect(e.x,e.y,20,20);
});

}

/* loop */

function loop(){

update();
draw();

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
