<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitty Castle 3D Mobile</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
}

#ui{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:20px;
z-index:2;
}

#jump{
position:fixed;
right:30px;
bottom:40px;
width:80px;
height:80px;
border-radius:50%;
border:none;
background:orange;
font-size:30px;
}

#joystick{
position:fixed;
left:30px;
bottom:40px;
width:120px;
height:120px;
background:rgba(255,255,255,0.15);
border-radius:50%;
}

#stick{
position:absolute;
width:60px;
height:60px;
left:30px;
top:30px;
background:white;
border-radius:50%;
}
</style>
</head>

<body>

<div id="ui">Moedas: 0</div>

<div id="joystick">
<div id="stick"></div>
</div>

<button id="jump">⭐</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

/* LUZ */

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

/* CHÃO */

const groundGeo = new THREE.BoxGeometry(100,1,100);
const groundMat = new THREE.MeshStandardMaterial({color:0x228822});
const ground = new THREE.Mesh(groundGeo,groundMat);
ground.position.y=-0.5;
scene.add(ground);

/* CASTELO */

function tower(x,z){

let geo = new THREE.CylinderGeometry(2,2,8,16);
let mat = new THREE.MeshStandardMaterial({color:0x999999});
let mesh = new THREE.Mesh(geo,mat);

mesh.position.set(x,4,z);

scene.add(mesh);

}

tower(-15,-15);
tower(15,-15);
tower(-15,15);
tower(15,15);

/* GATINHO (player) */

const playerGeo = new THREE.BoxGeometry(1,1,1);
const playerMat = new THREE.MeshStandardMaterial({color:0xffaa00});
const player = new THREE.Mesh(playerGeo,playerMat);

player.position.y=0.5;

scene.add(player);

/* MOEDAS */

let coins=[];
let score=0;

function spawnCoin(){

let geo=new THREE.CylinderGeometry(0.4,0.4,0.1,16);
let mat=new THREE.MeshStandardMaterial({color:0xffff00});
let coin=new THREE.Mesh(geo,mat);

coin.rotation.x=Math.PI/2;

coin.position.set(
(Math.random()-0.5)*40,
0.3,
(Math.random()-0.5)*40
);

scene.add(coin);

coins.push(coin);

}

for(let i=0;i<10;i++) spawnCoin();

/* CAMERA */

camera.position.set(0,6,8);

/* MOVIMENTO */

let moveX=0;
let moveZ=0;
let velocityY=0;
let jumping=false;

function update(){

player.position.x+=moveX;
player.position.z+=moveZ;

/* gravidade */

velocityY-=0.01;
player.position.y+=velocityY;

if(player.position.y<0.5){
player.position.y=0.5;
velocityY=0;
jumping=false;
}

/* câmera segue */

camera.position.x=player.position.x;
camera.position.z=player.position.z+8;
camera.lookAt(player.position);

/* pegar moedas */

coins.forEach((c,i)=>{

let dist = player.position.distanceTo(c.position);

if(dist<1){

scene.remove(c);
coins.splice(i,1);

score++;

document.getElementById("ui").innerText="Moedas: "+score;

spawnCoin();

}

});

}

/* LOOP */

function animate(){

requestAnimationFrame(animate);

update();

renderer.render(scene,camera);

}

animate();

/* BOTÃO PULAR */

document.getElementById("jump").onclick=()=>{

if(!jumping){

velocityY=0.2;
jumping=true;

}

};

/* JOYSTICK */

const joystick=document.getElementById("joystick");
const stick=document.getElementById("stick");

let dragging=false;

joystick.addEventListener("touchstart",()=>dragging=true);

document.addEventListener("touchend",()=>{
dragging=false;
moveX=0;
moveZ=0;
stick.style.left="30px";
stick.style.top="30px";
});

document.addEventListener("touchmove",(e)=>{

if(!dragging) return;

let rect=joystick.getBoundingClientRect();

let touch=e.touches[0];

let x=touch.clientX-rect.left-60;
let y=touch.clientY-rect.top-60;

let dist=Math.sqrt(x*x+y*y);
let max=40;

if(dist>max){

x=x/dist*max;
y=y/dist*max;

}

stick.style.left=(x+30)+"px";
stick.style.top=(y+30)+"px";

moveX=x*0.01;
moveZ=y*0.01;

});

</script>

</body>
</html>
