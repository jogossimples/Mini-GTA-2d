<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:#222;
color:white;
font-family:Arial;
text-align:center;
}

#ui{
padding:10px;
}

canvas{
background:#3cb043;
width:100%;
height:60vh;
}

button{
font-size:20px;
padding:10px;
margin:5px;
}

</style>

</head>

<body>

<div id="ui">
Energia: <span id="energy">5</span>
</div>

<canvas id="game"></canvas>

<div>
<button onclick="spawn('cat')">🐱 Gato</button>
<button onclick="spawn('tank')">🐻 Tanque</button>
</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = 400;

let energy=5;

let cats=[];
let enemies=[];

let towerHP=100;
let enemyTowerHP=100;

setInterval(()=>{
if(energy<10) energy++;
document.getElementById("energy").innerText=energy;
},1000);

function spawn(type){

if(type==="cat" && energy>=3){

cats.push({x:50,y:200,hp:20,atk:0.2,speed:1});

energy-=3;

}

if(type==="tank" && energy>=5){

cats.push({x:50,y:200,hp:60,atk:0.1,speed:0.5});

energy-=5;

}

}

setInterval(()=>{

enemies.push({x:canvas.width-50,y:200,hp:30,atk:0.2,speed:-0.8});

},3000);

function update(){

cats.forEach(c=>{

c.x+=c.speed;

if(c.x>canvas.width-120){

enemyTowerHP-=c.atk;

}

});

enemies.forEach(e=>{

e.x+=e.speed;

if(e.x<120){

towerHP-=e.atk;

}

});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* torres */

ctx.fillStyle="blue";
ctx.fillRect(20,150,80,100);

ctx.fillStyle="red";
ctx.fillRect(canvas.width-100,150,80,100);

/* gatos */

ctx.fillStyle="orange";
cats.forEach(c=>{
ctx.fillRect(c.x,c.y,20,20);
});

/* inimigos */

ctx.fillStyle="black";
enemies.forEach(e=>{
ctx.fillRect(e.x,e.y,20,20);
});

/* HP */

ctx.fillStyle="white";
ctx.fillText("HP "+towerHP,20,140);
ctx.fillText("HP "+enemyTowerHP,canvas.width-120,140);

}

function gameLoop(){

update();
draw();

requestAnimationFrame(gameLoop);

}

gameLoop();

</script>

</body>
</html>
