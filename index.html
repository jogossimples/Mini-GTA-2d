<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clicker Minecraft</title>
<style>
  body {
    margin: 0;
    font-family: 'Press Start 2P', cursive;
    background: #87CEEB;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #fff;
  }

  h1 {
    margin-top: 20px;
    text-align: center;
    color: #fff;
    text-shadow: 2px 2px 0 #000;
  }

  #block {
    width: 150px;
    height: 150px;
    margin-top: 50px;
    background: url('https://i.imgur.com/dYcYQ7E.png') no-repeat center/cover;
    cursor: pointer;
    image-rendering: pixelated;
    border: 4px solid #000;
    box-shadow: 4px 4px 0 #555;
    transition: transform 0.1s;
  }

  #block:active {
    transform: scale(0.9);
  }

  #stats {
    margin-top: 30px;
    text-align: center;
  }

  .stat {
    font-size: 16px;
    margin: 5px 0;
  }

  #upgrades {
    margin-top: 30px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    width: 90%;
  }

  .upgrade-btn {
    background: #8B4513;
    color: #fff;
    border: 2px solid #000;
    border-radius: 5px;
    padding: 10px;
    font-size: 12px;
    cursor: pointer;
    flex: 1 0 140px;
    text-align: center;
    image-rendering: pixelated;
  }

  .upgrade-btn:hover {
    background: #A0522D;
  }
</style>
</head>
<body>

<h1>⛏️ Clicker Minecraft ⛏️</h1>

<div id="block"></div>

<div id="stats">
  <div class="stat">Minérios: <span id="resources">0</span></div>
  <div class="stat">Por clique: <span id="rpc">1</span></div>
  <div class="stat">Automático por segundo: <span id="rps">0</span></div>
</div>

<div id="upgrades">
  <button class="upgrade-btn" data-cost="20" data-rpc="1">Upgrade Clique +1 (20)</button>
  <button class="upgrade-btn" data-cost="50" data-rps="1">Gerador Automático +1/s (50)</button>
</div>

<script>
let resources = 0;
let rpc = 1; // Resources per click
let rps = 0; // Resources per second

const resourcesEl = document.getElementById('resources');
const rpcEl = document.getElementById('rpc');
const rpsEl = document.getElementById('rps');
const block = document.getElementById('block');

// Clicar no bloco
block.addEventListener('click', () => {
  resources += rpc;
  resourcesEl.textContent = resources;
  block.style.transform = 'scale(0.95)';
  setTimeout(() => block.style.transform = 'scale(1)', 100);
});

// Upgrades
document.querySelectorAll('.upgrade-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const cost = parseInt(btn.dataset.cost);
    if(resources >= cost){
      resources -= cost;
      if(btn.dataset.rpc) rpc += parseInt(btn.dataset.rpc);
      if(btn.dataset.rps) rps += parseInt(btn.dataset.rps);
      resourcesEl.textContent = resources;
      rpcEl.textContent = rpc;
      rpsEl.textContent = rps;

      // Aumenta custo progressivamente
      btn.dataset.cost = Math.floor(cost * 1.5);
      btn.textContent = btn.textContent.replace(/\(\d+\)/, `(${btn.dataset.cost})`);
    }
  });
});

// Geração automática
setInterval(() => {
  resources += rps;
  resourcesEl.textContent = resources;
}, 1000);
</script>

</body>
</html>
